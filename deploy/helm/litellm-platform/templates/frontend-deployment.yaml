{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm-platform.fullname" . }}-frontend
  labels:
    app.kubernetes.io/component: frontend
    {{- include "litellm-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      {{- include "litellm-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        {{- include "litellm-platform.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXTAUTH_URL
              value: {{ index .Values.frontend.env "NEXTAUTH_URL" | quote }}
            - name: NEXTAUTH_SECRET
              value: {{ index .Values.frontend.env "NEXTAUTH_SECRET" | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ index .Values.frontend.env "KEYCLOAK_CLIENT_ID" | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              value: {{ index .Values.frontend.env "KEYCLOAK_CLIENT_SECRET" | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ default (printf "http://localhost:8082/realms/%s" .Values.keycloak.realm) (index .Values.frontend.env "KEYCLOAK_ISSUER") | quote }}
            - name: KEYCLOAK_ISSUER_INTERNAL
              value: {{ default (ternary (include "litellm-platform.keycloakInternalIssuer" .) .Values.keycloak.external.issuer .Values.keycloak.enabled) (index .Values.frontend.env "KEYCLOAK_ISSUER_INTERNAL") | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ default (include "litellm-platform.backendUrl" .) (index .Values.frontend.env "NEXT_PUBLIC_API_URL") | quote }}
            - name: AUTH_TRUST_HOST
              value: {{ index .Values.frontend.env "AUTH_TRUST_HOST" | quote }}
            - name: BACKEND_INTERNAL_URL
              value: {{ default (include "litellm-platform.backendUrl" .) (index .Values.frontend.env "BACKEND_INTERNAL_URL") | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
{{- end }}
