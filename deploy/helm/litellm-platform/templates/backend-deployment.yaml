{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm-platform.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "litellm-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "litellm-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "litellm-platform.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: APP_DATABASE_URL
              value: {{ default (printf "postgresql+asyncpg://%s:%s@%s:%s/%s" (include "litellm-platform.databaseUser" .) (include "litellm-platform.databasePassword" .) (include "litellm-platform.databaseHost" .) (include "litellm-platform.databasePort" .) (include "litellm-platform.databaseName" .)) (index .Values.backend.env "APP_DATABASE_URL") | quote }}
            - name: APP_LITELLM_BASE_URL
              value: {{ default (printf "http://%s:4000" .Values.litellm.internalServiceName) (index .Values.backend.env "APP_LITELLM_BASE_URL") | quote }}
            - name: APP_LITELLM_ADMIN_API_KEY
              value: {{ index .Values.backend.env "APP_LITELLM_ADMIN_API_KEY" | quote }}
            - name: APP_KEYCLOAK_BASE_URL
              value: {{ default (ternary (printf "http://%s-keycloak:%v" (include "litellm-platform.fullname" .) (.Values.keycloak.service.port | toString)) "" .Values.keycloak.enabled) (index .Values.backend.env "APP_KEYCLOAK_BASE_URL") | quote }}
            - name: APP_KEYCLOAK_INTERNAL_URL
              value: {{ default (ternary (printf "http://%s-keycloak:%v" (include "litellm-platform.fullname" .) (.Values.keycloak.service.port | toString)) "" .Values.keycloak.enabled) (index .Values.backend.env "APP_KEYCLOAK_INTERNAL_URL") | quote }}
            - name: APP_KEYCLOAK_REALM
              value: {{ index .Values.backend.env "APP_KEYCLOAK_REALM" | quote }}
            - name: APP_KEYCLOAK_CLIENT_ID
              value: {{ index .Values.backend.env "APP_KEYCLOAK_CLIENT_ID" | quote }}
            - name: APP_KEYCLOAK_CLIENT_SECRET
              value: {{ index .Values.backend.env "APP_KEYCLOAK_CLIENT_SECRET" | quote }}
            - name: APP_KEYCLOAK_REDIRECT_URI
              value: {{ index .Values.backend.env "APP_KEYCLOAK_REDIRECT_URI" | quote }}
            - name: APP_KEYCLOAK_IDP_HINT
              value: {{ index .Values.backend.env "APP_KEYCLOAK_IDP_HINT" | quote }}
            - name: APP_KEYCLOAK_SSL_VERIFY
              value: {{ index .Values.backend.env "APP_KEYCLOAK_SSL_VERIFY" | quote }}
            - name: APP_JWT_AUDIENCE
              value: {{ index .Values.backend.env "APP_JWT_AUDIENCE" | quote }}
            - name: APP_SESSION_SECRET_KEY
              value: {{ index .Values.backend.env "APP_SESSION_SECRET_KEY" | quote }}
            - name: APP_FRONTEND_URL
              value: {{ index .Values.backend.env "APP_FRONTEND_URL" | quote }}
            - name: APP_CORS_ORIGINS
              value: {{ index .Values.backend.env "APP_CORS_ORIGINS" | quote }}
            - name: APP_SLACK_WEBHOOK_URL
              value: {{ index .Values.backend.env "APP_SLACK_WEBHOOK_URL" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
{{- end }}
