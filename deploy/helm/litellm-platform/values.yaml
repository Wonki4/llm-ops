global:
  imageRegistry: "harbor-srep01.xxx.com"
  imagePullSecrets: []

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: llm-ops/frontend
    tag: v0.0.1-rc1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_URL: ""
    BACKEND_INTERNAL_URL: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: llm-ops/backend
    tag: v0.0.1-rc1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    APP_DATABASE_URL: ""
    APP_LITELLM_BASE_URL: ""
    APP_LITELLM_ADMIN_API_KEY: "sk-1234"
    APP_KEYCLOAK_BASE_URL: ""
    APP_KEYCLOAK_INTERNAL_URL: ""
    APP_KEYCLOAK_REALM: "litellm"
    APP_KEYCLOAK_CLIENT_ID: "litellm-portal"
    APP_KEYCLOAK_CLIENT_SECRET: "change-me-in-keycloak"
    APP_KEYCLOAK_REDIRECT_URI: ""
    APP_KEYCLOAK_IDP_HINT: ""
    APP_KEYCLOAK_SSL_VERIFY: ""
    APP_JWT_AUDIENCE: "litellm-portal"
    APP_SESSION_SECRET_KEY: "change-me-in-production-must-be-32-bytes"
    APP_FRONTEND_URL: ""
    APP_CORS_ORIGINS: '["http://localhost:3002"]'
    APP_SLACK_WEBHOOK_URL: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: llm-ops/backend
    tag: v0.0.1-rc1
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

database:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  auth:
    database: litellm
    username: llmproxy
    password: dbpassword9090
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  external:
    host: ""
    port: 5432
    database: litellm
    username: llmproxy
    password: dbpassword9090

keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  realm: litellm
  adminUser: admin
  adminPassword: admin
  importRealm: true
  external:
    issuer: ""
    jwksUri: ""

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

litellm:
  enabled: true
  internalServiceName: "litellm-helm-litellm"

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  tls: []
  frontend:
    enabled: true
    host: "portal.example.com"
    path: "/"
    pathType: Prefix
  backend:
    enabled: true
    host: "portal-api.example.com"
    path: "/"
    pathType: Prefix
