frontend:
  enabled: true
  env:
    NEXT_PUBLIC_API_URL: "https://portal-api.example.com"
    BACKEND_INTERNAL_URL: ""

backend:
  enabled: true
  env:
    APP_DATABASE_URL: ""
    APP_LITELLM_BASE_URL: "https://litellm.example.com"
    APP_LITELLM_ADMIN_API_KEY: "sk-1234"
    APP_KEYCLOAK_BASE_URL: "https://sso.example.com"
    APP_KEYCLOAK_INTERNAL_URL: "https://sso.example.com"
    APP_KEYCLOAK_REALM: "litellm"
    APP_KEYCLOAK_CLIENT_ID: "litellm-portal"
    APP_KEYCLOAK_CLIENT_SECRET: "change-me-in-keycloak"
    APP_KEYCLOAK_REDIRECT_URI: "https://portal.example.com/api/auth/callback"
    APP_KEYCLOAK_IDP_HINT: ""
    APP_KEYCLOAK_SSL_VERIFY: "true"
    APP_JWT_AUDIENCE: "litellm-portal"
    APP_SESSION_SECRET_KEY: "change-me-in-production-must-be-32-bytes"
    APP_FRONTEND_URL: "https://portal.example.com"
    APP_CORS_ORIGINS: '["https://portal.example.com"]'
    APP_SLACK_WEBHOOK_URL: ""

worker:
  enabled: true

database:
  enabled: false
  external:
    host: db.example.internal
    port: 5432
    database: litellm
    username: llmproxy
    password: change-me

keycloak:
  enabled: false

prometheus:
  enabled: false

litellm:
  enabled: false
