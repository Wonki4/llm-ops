# Helm values overlay — enable the prefix_affinity router when litellm-helm is a
# SUBCHART of deploy/helm/litellm-platform (the usual deployment here).
#
# Same content as values-prefix-affinity.yaml, but nested under the `litellm-helm:`
# key: helm only passes values to a subchart from the block named after it, so the
# top-level variant silently does nothing on the platform chart (no mount at all).
#
# Apply ALONGSIDE your existing platform values:
#   kubectl -n <ns> create configmap prefix-affinity-plugin \
#     --from-file=prefix_affinity_check.py=../prefix_affinity_check.py \
#     --dry-run=client -o yaml | kubectl -n <ns> apply -f -
#   helm upgrade <release> deploy/helm/litellm-platform -n <ns> \
#     -f <your-values>.yaml -f values-prefix-affinity-platform.yaml

litellm-helm:
  # Mount the plugin NEXT TO the proxy config (the chart mounts config.yaml at
  # /etc/litellm/config.yaml). LiteLLM's get_instance_fn resolves callback
  # modules ONLY relative to the config file's directory — it never consults
  # PYTHONPATH / sys.path — so any other location fails with
  # "ImportError: Could not find module file /etc/litellm/prefix_affinity_check.py".
  # ConfigMap 'prefix-affinity-plugin' must exist in the release namespace
  # (apply.sh creates/refreshes it).
  volumes:
    - name: prefix-affinity-plugin
      configMap:
        name: prefix-affinity-plugin
  volumeMounts:
    - name: prefix-affinity-plugin
      mountPath: /etc/litellm/prefix_affinity_check.py
      subPath: prefix_affinity_check.py
      readOnly: true

  # Plugin config.
  envVars:
    PREFIX_AFFINITY_STRATEGY: leading_slice   # "cache_control" for Anthropic explicit breakpoints
    PREFIX_AFFINITY_MIN_TOKENS: "1024"
    PREFIX_AFFINITY_TTL: "600"
    # Optional scoping (omit/empty = apply to all):
    # PREFIX_AFFINITY_MODELS: "gpt-4o,claude-3-5-sonnet"   # only these model-group names
    # PREFIX_AFFINITY_PROVIDERS: "azure"                   # only these providers

  # Registers the callback + enables pre-call checks. Deep-merges into your
  # existing proxy_config. NOTE: helm REPLACES lists — if you already set
  # litellm_settings.callbacks, merge this entry into that existing list instead.
  proxy_config:
    litellm_settings:
      callbacks: ["prefix_affinity_check.prefix_affinity_handler"]
    router_settings:
      enable_pre_call_checks: true
